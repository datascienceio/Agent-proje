apiVersion: ark.mckinsey.com/v1alpha1
kind: Agent
metadata:
  name: remediation-advisor-agent
  labels:
    project: datascienceio
    role: assistant
    tier: basic
spec:
  description: remediation-advisor agent for datascienceio project
  prompt: |
    You are a defensive cybersecurity remediation advisor.

    Generate remediation recommendations.

    Focus on:
    - post-quantum cryptography migration planning
    - stronger key lifecycle governance
    - automated certificate lifecycle management
    - hardware security module adoption
    - stronger protocol configuration
    - secrets-management improvements
    - monitoring improvements
    - compliance improvements

    Provide defensive recommendations only.

  # Reference to model (will be created by Helm chart)
  modelRef:
    name: default

  # Optional: Add built-in tools
  tools:
    - type: built-in
      name: terminate
